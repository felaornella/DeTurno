<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Farmacias de Turno Cerca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        #listContainerDesktop {
            display: inherit;
        }
        #listContainerMobile {
            display: none;
        }
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        @media only screen and (max-width: 1000px) {
            #listContainerDesktop {
                display: none;
            }
            #listContainerMobile {
                display: inherit;
            }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="container mt-3">
        <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

        <div class="row mb-2">
            <div class="col text-start">
                <h4>
                    <span style="color: var(--bs-primary);">
                        Farmacias de Turno
                    </span>
                </h4>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <div class="btn-group" role="group" style="width:100%">
                    <button id="mapViewBtn" class="btn btn-primary active">Mapa</button>
                    <button id="listViewBtn" class="btn btn-outline-primary">Listado</button>
                </div>
            </div>
        </div>

        <div id="mapContainer" class="row">
            <div id="map" class="col" style="height: 85vh;"></div>
        </div>

        <div id="listContainerDesktop" class="row d-none">
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Direccion</th>
                                    <th>Telefono</th>
                                    <th>Zona</th>
                                    <th>Distancia</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="listContainerMobile" class="row d-none">
            <div class="col">
                <div class="card">
                    <div class="card-body" id="pharmacyListBody"></div>
                </div>
            </div>
        </div>

        <div style="width: 100%; text-align: center;">
            <button class="btn btn-secondary mt-4 mb-4" id="buttonInstall" style="opacity: 0.5; cursor: not-allowed; padding-inline: 4rem;" disabled>Instalar App</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then(() => console.log('Service Worker Registered'));
        }
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
